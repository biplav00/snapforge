<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2440;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1525;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ec6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a8fff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="88" ry="88" fill="url(#bg)" />
  <rect x="32" y="32" width="448" height="448" rx="88" ry="88"
        fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="2" />

  <!-- Top-left corner bracket -->
  <path d="M 120,200 L 120,120 L 200,120"
        stroke="url(#stroke)" stroke-width="20" stroke-linecap="round" fill="none" filter="url(#glow)" />

  <!-- Bottom-right corner bracket -->
  <path d="M 312,392 L 392,392 L 392,312"
        stroke="url(#stroke)" stroke-width="20" stroke-linecap="round" fill="none" filter="url(#glow)" />

  <!-- Diagonal snap slash -->
  <line x1="340" y1="140" x2="172" y2="372"
        stroke="url(#stroke)" stroke-width="16" stroke-linecap="round" filter="url(#glow)" />

  <!-- Center spark/crosshair -->
  <circle cx="256" cy="256" r="10" fill="url(#stroke)" filter="url(#glow)" />

  <g stroke="url(#stroke)" stroke-width="5" stroke-linecap="round" opacity="0.8">
    <line x1="256" y1="224" x2="256" y2="238" />
    <line x1="256" y1="274" x2="256" y2="288" />
    <line x1="224" y1="256" x2="238" y2="256" />
    <line x1="274" y1="256" x2="288" y2="256" />
  </g>
</svg>
