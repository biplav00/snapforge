<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22">
  <!-- ScreenSnap: stylized "S" made from a screen capture frame that snaps/cuts -->

  <!-- Top-left corner bracket -->
  <path d="M 3,8 L 3,3 L 8,3" stroke="#000" stroke-width="2.2" stroke-linecap="round" fill="none" />

  <!-- Bottom-right corner bracket -->
  <path d="M 14,19 L 19,19 L 19,14" stroke="#000" stroke-width="2.2" stroke-linecap="round" fill="none" />

  <!-- Diagonal slash / snap line connecting the two brackets -->
  <line x1="15" y1="5" x2="7" y2="17" stroke="#000" stroke-width="2" stroke-linecap="round" />

  <!-- Small spark/flash at the cut point -->
  <circle cx="11" cy="11" r="1.5" fill="#000" />
  <line x1="11" y1="7.5" x2="11" y2="9" stroke="#000" stroke-width="1.2" stroke-linecap="round" />
  <line x1="11" y1="13" x2="11" y2="14.5" stroke="#000" stroke-width="1.2" stroke-linecap="round" />
  <line x1="7.5" y1="11" x2="9" y2="11" stroke="#000" stroke-width="1.2" stroke-linecap="round" />
  <line x1="13" y1="11" x2="14.5" y2="11" stroke="#000" stroke-width="1.2" stroke-linecap="round" />
</svg>
