<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recording Region</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
      #app { width: 100%; height: 100%; pointer-events: none; }
      svg { position: fixed; inset: 0; width: 100%; height: 100%; pointer-events: none; }
      .region-border {
        position: fixed;
        border: 1.5px dashed white;
        pointer-events: none;
        box-shadow: 0 0 0 0.5px rgba(0, 0, 0, 0.6), inset 0 0 0 0.5px rgba(0, 0, 0, 0.6);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <svg id="dim">
        <defs>
          <mask id="region-mask">
            <rect width="100%" height="100%" fill="white" />
            <rect id="cutout" x="0" y="0" width="0" height="0" fill="black" />
          </mask>
        </defs>
        <rect width="100%" height="100%" fill="rgba(0,0,0,0.35)" mask="url(#region-mask)" />
      </svg>
      <div id="border" class="region-border"></div>
    </div>
    <script>
      // Read region coordinates from URL params (in CSS pixels relative to this window)
      const params = new URLSearchParams(window.location.search);
      const x = parseFloat(params.get("x") || "0");
      const y = parseFloat(params.get("y") || "0");
      const w = parseFloat(params.get("w") || "0");
      const h = parseFloat(params.get("h") || "0");

      const cutout = document.getElementById("cutout");
      cutout.setAttribute("x", x);
      cutout.setAttribute("y", y);
      cutout.setAttribute("width", w);
      cutout.setAttribute("height", h);

      const border = document.getElementById("border");
      border.style.left = x + "px";
      border.style.top = y + "px";
      border.style.width = w + "px";
      border.style.height = h + "px";
    </script>
  </body>
</html>
