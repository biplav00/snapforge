name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (macOS)
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + bundling deps
        run: brew install qt dylibbundler ffmpeg

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # --- Quality gates ---------------------------------------------------
      # Run formatting + lint checks first: they're cheap and catch the most
      # common issues before we pay for the full test + Qt build below.
      - name: rustfmt (check)
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: cargo-deny (advisories, licenses, bans, sources)
        run: cargo deny check

      # --- Build & test ----------------------------------------------------
      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: Build snapforge-ffi (release)
        run: cargo build --release -p snapforge-ffi

      - name: Configure Qt build
        run: cmake -S qt -B qt/build -DCMAKE_PREFIX_PATH="$(brew --prefix qt)"

      - name: Build Qt app
        run: cmake --build qt/build --parallel
