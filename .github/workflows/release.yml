name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') && !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      next: ${{ steps.ver.outputs.next }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute next version (patch bump)
        id: ver
        run: |
          set -euo pipefail
          # Anchor on the latest release tag — the source of truth for the
          # shipped version. (Previously read crates/snapforge-core/Cargo.toml,
          # which was deleted in the snapforge-core facade removal.) checkout
          # above uses fetch-depth: 0, so all tags are present.
          CURRENT=$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null | sed 's/^v//')
          CURRENT=${CURRENT:-0.0.0}
          IFS='.' read -r MAJOR MINOR PATCH <<<"$CURRENT"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          echo "current=$CURRENT" >>"$GITHUB_OUTPUT"
          echo "next=$NEXT" >>"$GITHUB_OUTPUT"
          echo "tag=v$NEXT" >>"$GITHUB_OUTPUT"
          echo "Bumping $CURRENT -> $NEXT"

      - name: Bump version in CMakeLists.txt
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          # All three version fields move together (SNAPFORGE_VERSION used to be
          # left behind, drifting out of sync with the bundle versions/tags).
          sed -i.bak -E "s/(SNAPFORGE_VERSION \")[^\"]+(\")/\1$NEXT\2/" qt/CMakeLists.txt
          sed -i.bak -E "s/(MACOSX_BUNDLE_BUNDLE_VERSION \")[^\"]+(\")/\1$NEXT\2/" qt/CMakeLists.txt
          sed -i.bak -E "s/(MACOSX_BUNDLE_SHORT_VERSION_STRING \")[^\"]+(\")/\1$NEXT\2/" qt/CMakeLists.txt
          rm -f qt/CMakeLists.txt.bak

      - name: Commit, tag, push
        env:
          NEXT: ${{ steps.ver.outputs.next }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qt/CMakeLists.txt
          git commit -m "chore(release): v$NEXT"
          git tag "v$NEXT"
          git push origin main "v$NEXT"

      - name: Create GitHub Release (auto-generated notes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.ver.outputs.next }}
          PREV: ${{ steps.ver.outputs.current }}
        run: |
          gh release create "v$NEXT" \
            --repo "$GITHUB_REPOSITORY" \
            --title "v$NEXT" \
            --target main \
            --generate-notes \
            --notes-start-tag "v$PREV"

  dmg:
    name: Build & upload .dmg
    needs: release
    runs-on: macos-14
    env:
      TAG_NAME: ${{ needs.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Install Qt6 + bundling deps
        run: brew install qt dylibbundler ffmpeg

      - name: Cache cargo registry & target
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Single source of truth: same script developers run locally. Builds
      # release (cargo + cmake), bundles, signs, and packages the .dmg.
      - name: Build .dmg
        run: packaging/macos/build_dmg.sh

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$TAG_NAME" qt/build/dist/Snapforge-*.dmg --clobber --repo "$GITHUB_REPOSITORY"
