name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Version Bump
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.rp.outputs.release_created }}
      tag: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-mac:
    name: macOS ARM64
    needs: release-please
    if: needs.release-please.outputs.released == 'true'
    runs-on: macos-latest
    env:
      CARGO_INCREMENTAL: 1
      CARGO_PROFILE_RELEASE_LTO: thin
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 16
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: npm }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-darwin }
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: release-arm64
          save-if: true
      - run: npm ci
      - run: npm run build
      - name: Build .dmg
        run: npx tauri build --target aarch64-apple-darwin --bundles dmg
      - name: Upload to release
        run: |
          DMG=$(find target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          [ -n "$DMG" ] && gh release upload "${{ needs.release-please.outputs.tag }}" "$DMG" --clobber || (echo "No .dmg found" && exit 1)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Windows
    needs: release-please
    if: needs.release-please.outputs.released == 'true'
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: 1
      CARGO_PROFILE_RELEASE_LTO: thin
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 16
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: npm }
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          shared-key: release-windows
          save-if: true
      - run: npm ci
      - run: npm run build
      - name: Build .msi and .exe
        run: npx tauri build --bundles nsis,msi
      - name: Upload to release
        shell: bash
        run: |
          for f in target/release/bundle/nsis/*.exe target/release/bundle/msi/*.msi; do
            [ -f "$f" ] && gh release upload "${{ needs.release-please.outputs.tag }}" "$f" --clobber
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
